<div class="container-fluid py-4">
    <div class="card shadow-lg border-0 mb-5 hero-card">
        <div class="card-body p-5">
            <h2 class="fw-bold">
                👋 Welcome Back!
            </h2>
            <p class="text-secondary fs-5">
                Skip the waiting, not the service.
            </p>
            <div class="input-group mt-4 w-50">
  <span class="input-group-text">
    <i class="fa-solid fa-search"></i>
  </span>

  <input
    type="text"
    class="form-control"
    placeholder="Search hospitals, banks, restaurants..."
  >
</div>
        </div>
    </div>
    <div class="row g-4 mb-5">
     <div
        class="col-md-6 col-lg-3"
        *ngFor="let stat of stats">
            <div class="card stat-card h-100 border-0 shadow">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-secondary">
                                {{stat.title}}
                            </h6>
                            <h2 class="fw-bold">
                                {{stat.value}}
                            </h2>
                        </div>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
    <h3 class="fw-bold mb-4">
        Popular Categories
    </h3>

    <div class="row g-4 mb-5">
        <div
        class="col-6 col-md-4 col-lg-2"
        *ngFor="let item of categories">

            <div class="card category-card text-center shadow border-0">

                <div class="card-body">
                    <i
                    class="{{item.icon}} fa-3x mb-3 text-primary">
                    </i>
                    <h6>
                        {{item.name}}
                    </h6>

                </div>

            </div>

        </div>

    </div>

    <h3 class="fw-bold mb-4">

        Nearby Queues

    </h3>

    <div class="row g-4">

        <div
        class="col-lg-4"
        *ngFor="let queue of queues">

            <div class="card border-0 shadow queue-card">

                <div class="card-body">

                    <div class="d-flex justify-content-between">

                        <div>

                            <h4>

                                {{queue.name}}

                            </h4>

                            <p class="text-secondary">

                                {{queue.location}}

                            </p>

                        </div>

                        <span
                        class="badge bg-success">

                            {{queue.status}}

                        </span>

                    </div>

                    <div class="mt-4">

                        Waiting Time

                        <span class="float-end">

                            {{queue.waiting}} mins

                        </span>

                    </div>

                    <div class="progress my-2">

                        <div
                        class="progress-bar bg-warning"
                        [style.width.%]="queue.crowd">

                        </div>

                    </div>

                    <small>

                        Crowd Level

                        {{queue.crowd}}%

                    </small>

                    <button
                    class="btn btn-primary w-100 mt-4">

                        Join Queue

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>
