<div class="container py-5">
  <div class="row g-4">

    <div class="col-sm-6 col-lg-4" *ngFor="let hospital of hospitals">
      <div class="card h-100 border-0 shadow-sm overflow-hidden">

        <img [src]="hospital.image" class="card-img-top hospital-img" alt="{{ hospital.name }}">

        <div class="card-body d-flex flex-column p-4">

          <div class="d-flex justify-content-between align-items-start mb-3">
            <div>
              <h4 class="card-title fw-bold mb-1">
                {{ hospital.name }}
              </h4>

              <p class="text-secondary mb-0">
                📍 {{ hospital.location }}
              </p>

            </div>

            <span class="badge bg-success">
              Open
            </span>
          </div>

          <div class="bg-light rounded-3 p-3 mb-4">
            <div class="d-flex justify-content-between align-items-center">
              <span class="fw-semibold text-secondary">
                Current waiting
              </span>

              <span class="badge bg-warning text-dark fs-6">
                {{ hospital.waiting }} people
              </span>
            </div>
          </div>

          <div class="d-grid mt-auto">
            <button class="btn btn-primary" routerLink="/queue">View Queue</button>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>
