<div class="card shadow-sm h-100">
  <div class="card-body text-center">
    <h3 class="card-title">{{ name }}</h3>

    <p class="card-text">
      Waiting:
      <span class="badge bg-warning text-dark">
        {{ waiting }}
      </span>
      people
    </p>

    <button
      class="btn btn-primary"
      (click)="joinQueue()"
    >
      Join Queue
    </button>
  </div>
</div>
