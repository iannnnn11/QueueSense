<div class="app-layout">


  <app-sidebar
    [class.open]="sidebarOpen"
    (close)="toggleSidebar()">
  </app-sidebar>


  <div
    class="overlay"
    *ngIf="sidebarOpen"
    (click)="toggleSidebar()">
  </div>

  <div class="main-content">

    <app-navbar
      (menuClicked)="toggleSidebar()">
    </app-navbar>

  
    <router-outlet></router-outlet>

  </div>

</div>
