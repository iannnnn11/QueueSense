<div class="app-layout">

  <!-- Sidebar appears only once -->
  <app-sidebar
    [class.open]="sidebarOpen"
    (close)="toggleSidebar()">
  </app-sidebar>

  <!-- Dark overlay for mobile sidebar -->
  <div
    class="overlay"
    *ngIf="sidebarOpen"
    (click)="toggleSidebar()">
  </div>

  <div class="main-content">

    <app-navbar
      (menuClicked)="toggleSidebar()">
    </app-navbar>

    <!-- Routed page components appear here -->
    <router-outlet></router-outlet>

  </div>

</div>
